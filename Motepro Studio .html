    --like-red: #ff4d4f;
  }
  * {

  }
  body {
    margin: 0;
    background: var(--bg);
    font-family: system-ui, sans-serif;
    color: var(--text);
  }

  header {
    position: sticky;
    top: 0;
    background: rgba(3, 7, 18, 0.9);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 3px;    /* karibu zaidi */
}

  .logo {
    font-weight: 700;
    font-size: 1.3em;
    color: var(--accent);
  }
  .search-bar {
    flex: 1;
    display: flex;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 5px;
    border-radius: 8px 0 0 8px;
    border: none;
    font-size: automatic;
    outline: none;
  }
  button#searchBtn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 0 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 0 8px 8px 0;
    transition: background 0.3s ease;
  }
  button#searchBtn:hover {
    background: #3a7bd5;
  }
  .status {
    margin-left: 12px;
    font-size: 0.9em;
    color: var(--muted);
  }
.download-btn {
  background: #2563eb;   /* clean blue */
  color: #ffffff;
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 0.9rem;
  text-decoration: none;
  font-weight: 600;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: background 0.25s ease, transform 0.15s ease;
}

.download-btn:hover {
  background: #1d4ed8;
  transform: translateY(-1px);
}


  main {
    max-width: 900px;
    margin: 18px auto;
    padding: 8px 12px;
  }
  #feed {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 6px 18px rgba(2,6,23,0.6);
    overflow: hidden;
    transition: transform 0.3s ease;
  }
  .card.playing {
    transform: scale(1.03);
    box-shadow: 0 8px 24px rgba(96,165,250,0.6);
  }
  .instructions {
    font-size: 0.9em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .title {
    font-weight: 600;
    font-size: 1.1em;
    margin-bottom: 6px;
  }
  video {
    width: 100%;
    height: auto;
    border-radius: 8px;
    background: black;
    display: block;
  }
.meta {
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.85em;
}

/* LEFT SIDE */
.left-meta {
  display: flex;
  align-items: center;
}

/* RIGHT SIDE */
.right-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}

  .source a {
    color: var(--accent);
    text-decoration: none;
  }
  .source a:hover {
    text-decoration: underline;
  }
  .views, .likes {
    background: rgba(255, 255, 255, 0.1);
    padding: 6px 10px;
    border-radius: 9999px;
    user-select: none;
    cursor: default;
    display: flex;
    align-items: cente;
    gap: 6px;
  }
  .likes {
    cursor: pointer;
    transition: color 0.3s ease;
    color: var(--muted);
  }
  .likes.liked {
    color: var(--like-red);
  }
  .likes svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  #offlineToast {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 20px;
    background: var(--like-red);
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    display: none;
    z-index: 9999;
  }
  #offlineToast.show {
    display: block;
  }
  #sentinel {
    text-align: center;
    padding: 18px 0;
    color: var(--muted);
    font-size: 1em;
  }
  
  .status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.9em;
}

/* Status dot */
.status::before {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: gray;
}

/* Online = green */
.status.online::before {
  background: #22c55e; /* green */
  box-shadow: 0 0 6px #22c55e;
}

/* Offline = red */
.status.offline::before {
  background: #ef4444; /* red */
  box-shadow: 0 0 6px #ef4444;
}
  
  
h2 {
  color: white;
  text-shadow: 2px 2px 8px #000000;
  text-align: 25p;

  h2 {
    position: absolute;
    left: 5%;

.modal-btn {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  border: none;
  color: white;
  padding: 10px 18px;
  margin: 10px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.modal-btn.cancel {
  background: #9ca3af;
}

  font-size: 15px;

#tokenInput:focus {

[data-theme="light"] {
  --bg: #f8fafc;

.chars{

}
.chars span{
    font-size:1.3rem;
    display:inline-block;
    animation:move 3s ease-in-out infinite;
}
@keyframes move{
    0%{
        transform:translateX(-30%);
    }
    50%{
        text-shadow:0 20px 50px rgba(0,0,0,1);
    }
    100%{
        transform:translateX(30%);

}
.chars span:nth-child(2){
    animation-delay:0.3s;
}
.chars span:nth-child(3){
animation-delay:0.6s;
}
.chars span:nth-child(4){
animation-delay:0.9s;
}
.chars span:nth-child(5){
animation-delay:1.2s;
}
.chars span:nth-child(6){
animation-delay:1.5s;
}

  .title-line {
  display: flex;
  align-items: center;
  gap: 12px;
  white-space: nowrap; /* 🔥 force one line */
}

.chars {
  display: inline-flex;
  gap: 2px;
  line-height: 1;
}

.chars span {
  font-size: 1.7rem;
  display: inline-block;
  animation: move 3s ease-in-out infinite;
}
  
  /* FB-style image skeleton */
.img-wrapper {
  position: relative;
  width: 100%;

  /* 🔒 FIXED RATIO — 1536 × 1024 */
  aspect-ratio: 1536 / 1024;

  overflow: hidden;
  border-radius: 8px;
  background: #2a3445;
}


.img-wrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    #2a3445 25%,
    #3a455a 37%,
    #2a3445 63%
  );
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0% {
    transform: translateX(-100%);
  }
  100% {
    transform: translateX(100%);
  }
}

.img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* badili kuwa contain kama hutaki image ikatwe */
  display: block;
  opacity: 0;
  transition: opacity 0.4s ease;
}


/* when image loaded */
.img-wrapper.loaded::before {
  display: none;
}

.img-wrapper.loaded img {
  opacity: 1;
}

.likes.liked {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

backdrop-filter: blur(8px);

  font-weight: 600;

  @keyframes spin {
  to { transform: rotate(360deg); }

  // We'll duplicate videos to simulate infinite scrolling
  const extendedVideos = [];
  for(let i=0; i<10; i++) {
    videos.forEach(v => {
      extendedVideos.push({...v, id: v.id + '-' + i});
    });
  }
  // State
  let filtered = [...extendedVideos];
  const PAGE_SIZE = 3;
  let cursor = 0;

  const feed = document.getElementById('feed');
  const sentinel = document.getElementById('sentinel');
  const offlineToast = document.getElementById('offlineToast');
  const onlineStatus = document.getElementById('onlineStatus');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');

  // Load/save views & likes from localStorage for persistence
  const savedViews = JSON.parse(localStorage.getItem('videoViews') || '{}');
  const savedLikes = JSON.parse(localStorage.getItem('videoLikes') || '{}');

  function getViews(id, def) {
    return savedViews[id] ?? def ?? 0;
  }
  function saveViews() {
    localStorage.setItem('videoViews', JSON.stringify(savedViews));
  }
  function getLikes(id, def) {
    return savedLikes[id] ?? def ?? 0;
  }
  function saveLikes() {
    localStorage.setItem('videoLikes', JSON.stringify(savedLikes));
  }

  // Render single video card
  function renderCard(item) {
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.id = item.id;

  card.innerHTML = `
    <div class="badges">
     <span class="badge price">💰 ${item.price}</span>
      ${item.episode ? `<span class="badge episode">Free Token : ${item.episode}</span>` : ''}
    </div>

    <div class="title">${escapeHtml(item.title)}</div>
    <div class="instructions">${escapeHtml(item.instructions)}</div>

    <div class="img-wrapper">
      <img 
        src="${escapeHtml(item.img)}"
        alt="${escapeHtml(item.title)}"
        loading="lazy"
      />
    </div>

    <div class="meta">
      <div class="views">
        👁 <span class="views-count">${getViews(item.id, item.views)}</span>
      </div>

      <div class="likes" role="button" tabindex="0">
        ❤️ Like <span class="likes-count">${getLikes(item.id, item.likes)}</span>
      </div>

      <a class="download-btn"
         href="javascript:void(0)"
         onclick="openTokenModal('${item.id}', '${item.downloadUrl}')">
        ⬇️ Download
      </a>
    </div>
  `;

  /* IMAGE LOAD FIX */
  const img = card.querySelector('.img-wrapper img');
  const wrapper = card.querySelector('.img-wrapper');

  if (img.complete) {
    wrapper.classList.add('loaded');
  } else {
    img.addEventListener('load', () => {
      wrapper.classList.add('loaded');
    });
  }

  /* LIKE LOGIC */
  const likeBtn = card.querySelector('.likes');
  likeBtn.classList.toggle('liked', getLikes(item.id, item.likes) > 0);

  likeBtn.addEventListener('click', () => toggleLike(item.id, likeBtn));
  likeBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleLike(item.id, likeBtn);
    }
  });

  return card;
}

  // Toggle like/unlike
  function toggleLike(id, likeBtn) {
    const liked = savedLikes[id] > 0;
    if (liked) {
      savedLikes[id] = 0;
      likeBtn.classList.remove('liked');
      likeBtn.setAttribute('aria-pressed', 'false');
    } else {
      savedLikes[id] = 1;
      likeBtn.classList.add('liked');
      likeBtn.setAttribute('aria-pressed', 'true');
    }
    saveLikes();
    likeBtn.querySelector('.likes-count').textContent = savedLikes[id];
  }

  // Append next page videos
  function loadNextPage() {
    if (cursor >= filtered.length) {
      sentinel.textContent = 'Coming Soon';
      return;
    }
    const slice = filtered.slice(cursor, cursor + PAGE_SIZE);
    slice.forEach(item => {
      feed.appendChild(renderCard(item));
    });
    cursor += PAGE_SIZE;
    observeVideos();
  }

  // Intersection observer to play videos when mostly visible
  let playObserver;
  function observeVideos() {
    if (playObserver) playObserver.disconnect();
    const options = { threshold: 0.6 };
    playObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) {
          video.closest('.card').classList.add('playing');
          video.muted = true;
          video.play().catch(() => {});
        } else {
          video.closest('.card').classList.remove('playing');
          video.pause();
        }
      });
    }, options);
    document.querySelectorAll('video').forEach(v => playObserver.observe(v));
  }

 function escapeHtml(text = '') {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}


  // Search filter ponera 
  function filterVideos(query) {
  if (!query) return [...extendedVideos]; // kawaida infinite scroll

  query = query.toLowerCase();

  // Tumia videos original tu wakati wa search
  return videos.filter(v => {
    return (
      (v.title || '').toLowerCase().includes(query) ||
      (v.instructions || '').toLowerCase().includes(query) ||
      (v.source || '').toLowerCase().includes(query)
    );
  });
}


  // Search handling
  function handleSearch() {
    const q = searchInput.value.trim();
    filtered = filterVideos(q);
    cursor = 0;
    feed.innerHTML = '';
    sentinel.textContent = filtered.length ? 'Load more videos' : 'No videos found';
    loadNextPage();
    if (searchInput.value.trim()) {
  infiniteObserver.disconnect();
} else {
  infiniteObserver.observe(sentinel);
}
  }
  searchBtn.addEventListener('click', handleSearch);
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      handleSearch();
    }
  });

  // Infinite scroll observer
  const infiniteObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      loadNextPage();
    }
  });
  infiniteObserver.observe(sentinel);

  // Detect online/offline status
  function updateOnlineStatus() {
  if (navigator.onLine) {
    onlineStatus.textContent = 'Online';
    onlineStatus.classList.add('online');
    onlineStatus.classList.remove('offline');
    offlineToast.classList.remove('show');
  } else {
    onlineStatus.textContent = 'Offline';
    onlineStatus.classList.add('offline');
    onlineStatus.classList.remove('online');
    offlineToast.classList.add('show');
  }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // Initialize feed
  handleSearch();

  const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme');

/* Load saved theme */
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateToggleText(savedTheme);
}

/* Toggle theme */
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const newTheme = current === 'light' ? 'dark' : 'light';

  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateToggleText(newTheme);
});

function updateToggleText(theme) {
  themeToggle.textContent = theme === 'light' ? '🌞 Light' : '🌙 Dark';
}

  if (!savedTheme) {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
}
